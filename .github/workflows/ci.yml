name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: yakimaweb
          POSTGRES_PASSWORD: yakimaweb
          POSTGRES_DB: yakimaweb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      DJANGO_DEBUG: "True"
      DATABASE_URL: postgres://yakimaweb:yakimaweb@localhost:5432/yakimaweb
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      ARELLO_API_KEY: ""
      GEMINI_API_KEY: ""

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install uv
        run: pip install uv
      - name: Install deps
        run: |
          uv pip install --system -e .
          uv pip install --system pytest pytest-django pytest-cov factory-boy responses freezegun ruff djlint
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Tests
        run: pytest --cov=apps --cov-report=term-missing

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      # NB: e2e against deployed preview env — wired in Phase 8
      - name: Skip e2e for now
        run: echo "Run via E2E_BASE_URL once preview env stands up"
