{% extends "base.html" %}
{% block title %}License verification — {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="section-y">
  <div class="container-page max-w-2xl">
    <p class="label-luxe text-gold-hi">Verification status</p>
    <h1 class="h-page mt-3">License #{{ profile.license_number }}</h1>

    {# HTMX polls every 3s until status leaves "pending" #}
    <div id="status-card"
         hx-get="{% url 'accounts:realtor_status' %}"
         hx-trigger="every 3s"
         hx-swap="outerHTML"
         hx-target="#status-card">
      {% include "accounts/_status_partial.html" %}
    </div>
  </div>
</section>
{% endblock %}
