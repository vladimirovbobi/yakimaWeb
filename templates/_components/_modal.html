{# Accessible modal w/ Alpine focus trap. #}
{# Usage:
  <div x-data="{ open: false }">
    <button @click="open = true" class="btn-gold btn-md">Open</button>
    {% include "_components/_modal.html" with title="Confirm" %}
      <p>Body content</p>
    {% endinclude %}  <-- (Django doesn't support endinclude; use a wrapper template extends)
#}
<template x-teleport="body">
  <div x-show="open" x-cloak
       class="fixed inset-0 z-50 flex items-center justify-center p-4"
       @keydown.escape.window="open = false">
    {# backdrop #}
    <div x-show="open" x-transition.opacity
         class="absolute inset-0 bg-black/70 backdrop-blur-sm" @click="open = false"></div>

    {# panel #}
    <div x-show="open" x-trap.noscroll="open"
         x-transition:enter="transition ease-luxe duration-200"
         x-transition:enter-start="opacity-0 scale-95 translate-y-2"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0 scale-95"
         role="dialog" aria-modal="true" aria-labelledby="modal-title"
         class="relative surface w-full max-w-lg p-8">
      <button @click="open = false" aria-label="Close"
              class="absolute top-3 right-3 text-mist hover:text-ivory text-xl leading-none">×</button>
      {% if title %}
        <h2 id="modal-title" class="h-section mb-4">{{ title }}</h2>
      {% endif %}
      <div class="text-mist">
        {% block modal_body %}{{ body|safe }}{% endblock %}
      </div>
    </div>
  </div>
</template>
