{# Wrap any block to fade-up on scroll. Honors prefers-reduced-motion via CSS. #}
{# Usage:
  {% include "_components/_scroll_reveal.html" with delay=200 %}
    <div>...</div>
  {% endinclude %}
  -- For Django use the {% with %} pattern, or copy this block inline.
#}
<div x-data x-reveal{% if delay %}:{{ delay }}{% endif %}>
  {{ slot|safe }}
</div>
