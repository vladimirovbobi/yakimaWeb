{% extends "base.html" %}
{% block title %}New thread — {{ SITE_NAME }} community{% endblock %}

{% block content %}
<section class="section-y">
  <div class="container-page max-w-2xl">
    <div x-data x-reveal>
      <p class="label-luxe text-gold-hi">New thread</p>
      <h1 class="h-page mt-3">Ask. Discuss. Help.</h1>
    </div>

    <form method="post" class="surface mt-8 p-8 space-y-5">
      {% csrf_token %}

      <div>
        <label for="id_flair" class="block text-sm font-medium text-ivory">Flair <span class="text-gold ml-1">*</span></label>
        <select id="id_flair" name="flair" required class="input">
          <option value="">— pick a tag —</option>
          {% for f in flairs %}<option value="{{ f.pk }}">{{ f.label }}</option>{% endfor %}
        </select>
      </div>

      <div>
        <label for="id_title" class="block text-sm font-medium text-ivory">Title <span class="text-gold ml-1">*</span></label>
        <input id="id_title" name="title" type="text" required maxlength="240" class="input"
               placeholder="What are you trying to figure out?">
      </div>

      <div>
        <label for="id_body" class="block text-sm font-medium text-ivory">Body <span class="text-gold ml-1">*</span></label>
        <textarea id="id_body" name="body" required rows="10" maxlength="10000" class="input"
                  placeholder="Context. What you've tried. What you need."></textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="btn-gold btn-md">Post thread</button>
        <a href="{% url 'forum:thread_list' %}" class="btn-ghost btn-md">Cancel</a>
      </div>

      <p class="text-xs text-dim pt-2">
        All threads moderated. Off-topic, spam, and self-promotion outside the
        <a href="{% url 'core:guidelines' %}" class="underline hover:text-mist">guidelines</a>
        get removed.
      </p>
    </form>
  </div>
</section>
{% endblock %}
