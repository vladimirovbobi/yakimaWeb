# Production-shape compose for ops review only.
# Real deploys happen on Railway / Fly via railway.json or fly.toml.
services:
  web:
    image: ghcr.io/yakimaweb/web:latest
    restart: unless-stopped
    env_file: [.env.prod]
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile -"
    expose: ["8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    image: ghcr.io/yakimaweb/web:latest
    restart: unless-stopped
    env_file: [.env.prod]
    command: celery -A config worker --loglevel=info --concurrency=2

  celery-beat:
    image: ghcr.io/yakimaweb/web:latest
    restart: unless-stopped
    env_file: [.env.prod]
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [web]

volumes:
  caddy_data:
  caddy_config:
